<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de compras</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/style/style.css">
</head>

<body>

    <div class="container">
        <main>
            <div class="logo">
                <img src="/assets/icons/logo.svg" alt="Logo">
            </div>
            <div class="title">
                <img src="/assets/icons/link button.svg" alt="Voltar">
                <h1>Compras da semana</h1>
            </div>
            <form>
                <label for="text"></label>
                <input id="text" type="text" placeholder="Adicione um novo item">
                <button id="btn">
                    Adicionar item
                </button>
            </form>
            <div class="lista">
                <ul id="ul">
                    <li>
                        <div class="container-chek">
                            <input type="checkbox">
                            <p>Pão de forma</p>
                        </div>
                        <button class="btn-lixo">
                            <img src="/assets/icons/Frame.svg" alt="Lixeira">
                        </button>
                    </li>
                    <li>
                        <div class="container-chek">
                            <input type="checkbox">
                            <p>Café preto</p>
                        </div>
                        <button class="btn-lixo">
                            <img src="/assets/icons/Frame.svg" alt="Lixeira">
                        </button>
                    </li>
                    <li>
                        <div class="container-chek">
                            <input type="checkbox">
                            <p>Suco de laranja</p>
                        </div>
                        <button class="btn-lixo">
                            <img src="/assets/icons/Frame.svg" alt="Lixeira">
                        </button>
                    </li>
                    <li>
                        <div class="container-chek">
                            <input type="checkbox">
                            <p>Bolacha</p>
                        </div>
                        <button class="btn-lixo">
                            <img src="/assets/icons/Frame.svg" alt="Lixeira">
                        </button>
                    </li>
                </ul>
            </div>
        </main>
    </div>

</body>

</html>
