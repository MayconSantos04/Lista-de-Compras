<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de compras</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style/style.css">
</head>

<body>

    <div class="container">
        <main>
            <div class="logo">
                <img src="assets/icons/logo.svg" alt="Logo">
            </div>
            <div class="title">
                <img src="assets/icons/link button.svg" alt="Voltar">
                <h1>Compras da semana</h1>
            </div>

            <form>
                <input id="text" type="text" placeholder="Adicione um novo item">
                <button id="btn">
                    Adicionar item
                </button>
            </form>

            <div class="lista">
                <ul id="ul">
                    <li>
                        <label class="container-chek">
                            <input class="checkbox" type="checkbox">
                            <p class="paragraph">Pão de forma</p>
                        </label>
                        <button class="btn-lixo">
                            <img class="imgLixo" src="assets/icons/Frame.svg" alt="Lixeira">
                        </button>
                    </li>
                    <li>
                        <label class="container-chek">
                            <input class="checkbox" type="checkbox">
                            <p class="paragraph">Café preto</p>
                        </label>
                        <button class="btn-lixo">
                            <img class="imgLixo" src="assets/icons/Frame.svg" alt="Lixeira">
                        </button>
                    </li>
                    <li>
                        <label class="container-chek">
                            <input class="checkbox" type="checkbox">
                            <p class="paragraph">Suco de laranja</p>
                        </label>
                        <button class="btn-lixo">
                            <img class="imgLixo" src="assets/icons/Frame.svg" alt="Lixeira">
                        </button>
                    </li>
                    <li>
                        <label class="container-chek">
                            <input class="checkbox" type="checkbox">
                            <p class="paragraph">Bolacha</p>
                        </label>
                        <button class="btn-lixo">
                            <img class="imgLixo" src="assets/icons/Frame.svg" alt="Lixeira">
                        </button>
                    </li>
                </ul>

                <span class="container-warning hidden">
                    <div class="container-ajuste">
                        <img src="assets/icons/Icon.svg" alt="">
                        <p>O item foi removido da lista</p>
                    </div>
                    <button class="btn-delete">
                        <img src="assets/icons/delete-small.svg" alt="Delete">
                    </button>
                </span>
            </div>
        </main>
    </div>

    <script src="script.js"></script>

</body>

</html>
